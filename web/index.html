<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <script>
      ;(function () {
        try {
          var t = localStorage.getItem('skill-hub-theme')
          if (t === 'dark') document.documentElement.classList.remove('light')
          else document.documentElement.classList.add('light')
        } catch (_) {
          document.documentElement.classList.add('light')
        }
      })()
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Skill Hub</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%234f46e5'/><text x='50' y='72' text-anchor='middle' font-size='56' font-family='-apple-system,sans-serif' font-weight='bold' fill='%23f8fafc'>S</text></svg>" />
    <style>
      html,
      body {
        margin: 0;
        font-family: -apple-system, system-ui, sans-serif;
      }
      html.light,
      html.light body {
        background: #f8fafc;
        color: #1e293b;
      }
      html:not(.light),
      html:not(.light) body {
        background: #020617;
        color: #e2e8f0;
      }
      #root:empty::before {
        content: '';
        position: fixed; inset: 0;
        display: flex; align-items: center; justify-content: center;
      }
      .boot {
        position: fixed; inset: 0;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        gap: 12px; pointer-events: none;
      }
      .boot .spinner {
        width: 32px; height: 32px; border: 3px solid #1e293b; border-top-color: #6366f1;
        border-radius: 50%; animation: spin 0.8s linear infinite;
      }
      .boot .msg { font-size: 13px; color: #64748b; }
      .boot .hint { font-size: 11px; color: #475569; margin-top: 8px; }
      .boot .hint code { background: #1e293b; padding: 2px 6px; border-radius: 4px; color: #94a3b8; }
      html.light .boot .hint code { background: #e2e8f0; color: #475569; }
      .boot.boot-fail { pointer-events: auto; padding: 0 24px; max-width: 560px; text-align: center; }
      .boot.boot-fail .hint { line-height: 1.55; }
      @keyframes spin { to { transform: rotate(360deg); } }
      /* Hide boot once React mounts anything */
      #root:not(:empty) ~ .boot { display: none; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <div class="boot">
      <div class="spinner"></div>
      <div class="msg">正在加载 Skill Hub...</div>
      <div class="hint">如果这个画面持续不消失，打开 DevTools Console 查看错误，或访问 <code>/api/debug</code></div>
    </div>
    <noscript>
      <div style="padding:24px;color:#f87171">Skill Hub 需要启用 JavaScript。</div>
    </noscript>
    <script>
      ;(function () {
        var root = document.getElementById('root')
        if (!root) return

        var timeoutId
        var cleared = false
        function clearBootTimer() {
          if (cleared) return
          cleared = true
          if (timeoutId) clearTimeout(timeoutId)
        }

        function fail(title, html) {
          var boot = document.querySelector('.boot')
          if (!boot || boot.classList.contains('boot-fail')) return
          boot.classList.add('boot-fail')
          var msg = boot.querySelector('.msg')
          var hint = boot.querySelector('.hint')
          if (msg) msg.textContent = title
          if (hint) hint.innerHTML = html
          var sp = boot.querySelector('.spinner')
          if (sp) sp.style.display = 'none'
        }

        try {
          var mo = new MutationObserver(function () {
            if (root.childNodes.length) {
              clearBootTimer()
              mo.disconnect()
            }
          })
          mo.observe(root, { childList: true, subtree: true })
        } catch (_) {}

        timeoutId = setTimeout(function () {
          if (root.childNodes.length) return
          fail(
            '前端未能启动（界面脚本未运行）',
            '常见原因：用文件方式或错误的静态服务器打开了页面，导致 <code>/src/main.tsx</code>（开发）或 <code>/assets/*.js</code>（生产）无法加载。<br /><br />请在项目根目录执行 <code>npm run dev</code>，用浏览器打开 <code>http://127.0.0.1:5173</code>；或 <code>npm run build && npm start</code> 后访问终端打印的地址。打开 DevTools → Network 查看脚本是否 404。',
          )
        }, 10000)

        window.addEventListener(
          'error',
          function (e) {
            var t = e.target
            if (!t || t === window || !t.tagName) return
            var tag = t.tagName
            if (tag !== 'SCRIPT' && tag !== 'LINK') return
            var url = t.src || t.href
            if (!url) return
            clearBootTimer()
            fail(
              '前端资源加载失败',
              '无法加载：<code>' + url + '</code>。请按上一条说明用 Vite 开发服务器或构建后的 Node 服务访问，不要直接双击打开 HTML。',
            )
          },
          true,
        )
      })()
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
